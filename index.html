<!DOCTYPE html5>
<html>

<head>
    <title>
        Expense Tracker
    </title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="body-container">
        <div>
            <h3>Expense Tracker</h3>
        </div>
        <div class="stat-container">

            <div class="balance-container">
                <p class="titles"> YOUR BALANCE</p>
                <p class="total-amount">$7000.00</p>
            </div>
            <div class="income-expense-container">
                <div class="income-container align-center">
                    <p>INCOME</p>
                    <p class="income-amount"> $7000.00</p>
                </div>
                <hr class="vertical-hr">
                <div class="expense-container align-center">
                    <p>EXPENSE</p>
                    <p class="expense-amount">$0.00</p>
                </div>
            </div>

            <p class="titles">History</p>
            <hr class="hr-full">
            <div>
                <div class="history-box">
                    <p>Marriage expense</p>
                    <p>+500</p>
                </div>
                <div class="history-box">
                    <p>Shopping expense</p>
                    <p>+2000</p>
                </div>
            </div>
            <p class="titles">Add new transaction</p>
            <hr class="hr-full">
            
            <div class="input-container">
                <p class="text">Text</p>
                <p class="text">Price</p>
                <input type="text" placeholder="Enter text.." class="expense-text js-expense-text">
                <input type="text" placeholder="Price" class="expense-price js-expense-price">
            </div>

            <button class="add-btn js-add-btn"> Add</button>
        </div>
    </div>

    <script src="script.js" ></script>
</body>

</html>
