<!DOCTYPE html5>
<html>

<head>
    <title>
        Expense Tracker
    </title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="body-container">
        <div>
            <h3>Expense Tracker</h3>
        </div>
        <div class="stat-container">

            <div class="balance-container js-balance-container">

            </div>
            <div class="income-expense-container js-income-expense-container">

            </div>

            <p class="titles">History</p>
            <hr class="hr-full">
            <div class="js-expense-history-container">
            </div>
            <p class="titles">Add new transaction</p>
            <hr class="hr-full">

            <div class="input-container">
                <p class="text">Text</p>
                <p class="text">Amount</p>
                <input type="text" placeholder="Enter text.." class="expense-text js-expense-text">
                <input type="text" placeholder="Amount" class="expense-price js-expense-price">
            </div>

            <button class="add-btn js-add-btn"> Add</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
